<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Inteligentne Folie — Przerwa Techniczna</title>
    <link rel="icon" href="./logo.webp" type="image/webp" />
    <style>
      :root {
        --bg: #0a0a0a;
        --fg: #ffffff;
        --muted: rgba(255, 255, 255, 0.70);
        --line: rgba(255, 255, 255, 0.14);
        --accent: #00f0ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans",
          sans-serif;
        color: var(--fg);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.00)), var(--bg);
      }

      .wrap {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 40px 18px;
      }

      .card {
        width: min(720px, 100%);
        border: 1px solid var(--line);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.03);
        padding: 34px 28px;
      }

      .logo {
        width: min(360px, 78vw);
        height: auto;
        display: block;
        margin: 0 auto 18px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.25);
        color: var(--muted);
        font-size: 13px;
        letter-spacing: 0.2px;
      }

      h1 {
        margin: 18px 0 10px;
        font-size: clamp(26px, 3.0vw, 40px);
        line-height: 1.12;
        font-weight: 640;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0;
        max-width: 56ch;
        font-size: clamp(15px, 1.4vw, 18px);
        color: var(--muted);
        line-height: 1.65;
      }

      .divider {
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.55), transparent);
        margin: 18px 0;
      }

      .meta {
        margin-top: 18px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.62);
      }

      .meta a {
        color: rgba(255, 255, 255, 0.88);
        text-decoration: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.22);
      }

      .meta a:hover {
        border-bottom-color: rgba(0, 240, 255, 0.70);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card" role="region" aria-label="Przerwa techniczna">
        <img class="logo" src="./logo.webp" alt="Inteligentne Folie" />

        <div class="badge" aria-label="Status">
          <span>Zaplanowany serwis (przerwa techniczna)</span>
        </div>

        <h1>Wrócimy wkrótce</h1>
        <p>
          Trwa zaplanowane utrzymanie serwisu. Pracujemy nad aktualizacją treści i konfiguracji dotyczącej inteligentnych
          folii i paneli PDLC/LCD.
        </p>

        <div class="divider" aria-hidden="true"></div>

        <div class="meta">
          Kontakt: <a href="mailto:kontakt@jestemprogramista.pl">kontakt@jestemprogramista.pl</a>
        </div>
      </section>
    </main>
  </body>
</html>
