services:
  inteligentnefolie:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inteligentnefolie
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - web-network

networks:
  web-network:
    external: true
